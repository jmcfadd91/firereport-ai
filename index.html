<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireReport AI</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #ffffff;
            border-radius: 4px;
            resize: vertical;
            min-height: 150px;
        }
        
        button {
            padding: 10px 20px;
            margin-right: 10px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #ff5252;
        }
        
        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border-radius: 4px;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <h1>FireReport AI</h1>
    <textarea placeholder="Describe the incident..."></textarea>
    <div>
        <button id="generate-btn">Generate Report</button>
        <button id="copy-btn">Copy</button>
    </div>
    <div id="output"></div>
</body>
</html>
