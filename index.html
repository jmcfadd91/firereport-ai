<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireReport AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 30px;
            color: #ff6b6b;
        }
        
        .api-key-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .api-key-section label {
            font-weight: 600;
        }
        
        .api-key-section input {
            flex: 1;
            max-width: 400px;
            padding: 8px 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .api-key-section input:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        
        .input-section {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        
        textarea::placeholder {
            color: #666;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 30px;
        }
        
        button {
            padding: 10px 20px;
            background-color: #ff6b6b;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #ff5252;
        }
        
        button:active {
            background-color: #ff4545;
        }
        
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        
        #output {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 20px;
            min-height: 100px;
            margin-top: 20px;
        }
        
        #output:empty {
            display: none;
        }
        
        #output:not(:empty) {
            display: block;
        }
        
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .output-header h2 {
            margin: 0;
            color: #ff6b6b;
            font-size: 18px;
        }
        
        .copy-btn {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .error {
            color: #ff6b6b;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #ff6b6b;
            border-radius: 4px;
            margin-top: 20px;
        }
        
        .loading {
            color: #ffd700;
        }
        
        .nfirs-field {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }
        
        .nfirs-field:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .field-label {
            font-weight: 600;
            color: #ffd700;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .field-value {
            color: #e0e0e0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚒 FireReport AI</h1>
        
        <div class="api-key-section">
            <label for="apiKey">Anthropic API Key:</label>
            <input 
                type="password" 
                id="apiKey" 
                placeholder="sk-ant-..."
                title="Your Anthropic API key will only be used for API calls from your browser"
            >
        </div>
        
        <div class="input-section">
            <label for="incidentDescription">Incident Description:</label>
            <textarea 
                id="incidentDescription" 
                placeholder="Describe the incident..."
            ></textarea>
        </div>
        
        <div class="button-group">
            <button id="generateBtn">Generate Report</button>
            <button id="copyBtn" style="display: none;" class="copy-btn">Copy</button>
        </div>
        
        <div id="output"></div>
    </div>
    
    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const incidentTextarea = document.getElementById('incidentDescription');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const outputDiv = document.getElementById('output');
        
        const ANTHROPIC_API_URL = 'https://api.anthropic.com/v1/messages';
        
        const NFIRS_SYSTEM_PROMPT = `You are an expert NFIRS 5.0 (National Fire Incident Reporting System) analyst. Your task is to extract structured fire incident data from narrative descriptions with high accuracy and consistency.

## EXTRACTION GUIDELINES:

### Date & Time Fields
- Incident Date: Extract as MM/DD/YYYY format
- Incident Time: Extract as HH:MM in 24-hour format (if available)
- First Unit Arrived: Note if response time is mentioned

### Location Fields
- Street Address: Complete address including number and street name
- City/Locality: Jurisdiction or city name
- State: Two-letter state code
- ZIP Code: 5-digit postal code
- Property Type/Use: Classify as Residential, Commercial, Industrial, Vehicle, Other (with specifics)
- Building Construction Type: If determinable (Wood, Steel, Concrete, Mixed, etc.)

### Incident Classification
- Incident Type: Must categorize as one of: Structure Fire, Vehicle Fire, Wildland Fire, Hazmat, EMS/Medical, False Alarm, Service Call, Non-Emergency, Other
- Specific Classification: More detailed subcategory based on context
- Structure Type (if fire): Single-family, Multi-family, Commercial, Industrial, Agricultural, Vehicle, Wildland

### Personnel & Casualty Information
- Civilian Injuries: Count and severity (if mentioned - minor, moderate, severe)
- Civilian Deaths: Count and circumstances
- Firefighter Injuries: Count and type (burn, trauma, respiratory, other)
- Firefighter Deaths: Count
- Animals Involved: Note any livestock or pets affected

### Loss Assessment
- Structure Loss: Estimated dollar amount or description (total loss, partial, minor)
- Content Loss: Contents/personal property damage estimate
- Cause of Loss: What was damaged (structure, contents, both)
- Insured Value: If mentioned

### Fire Dynamics
- Primary Cause: Root cause (Arson, Accidental, Natural, Equipment Failure, Unknown, etc.)
- Ignition Source: What ignited the fuel (matches, cigarette, electrical, appliance, etc.)
- Material First Ignited: First fuel that caught fire (upholstery, wood framing, curtains, etc.)
- Fire Spread Pattern: How did it spread (vertical, horizontal, contained, rapid, slow)
- Area of Origin: Specific room or area where fire started
- Extent of Fire: Confined to room, floor, building, spread to adjacent structures
- Smoke/Flame Visibility: From what distance was fire visible

### Hazards & Environmental Factors
- Hazardous Materials: Any chemicals, propane, etc. involved
- Weather Conditions: Temperature, wind, visibility, precipitation (if relevant)
- Access Issues: Were there barriers to entry or water supply issues
- Pre-incident Conditions: Locked doors, utilities status, occupancy

### Response Information
- Number of Units Dispatched: Count of fire engines, ladders, rescues
- Number of Personnel Deployed: If mentioned
- Mutual Aid: Departments that assisted
- Special Equipment Used: Extrication, hazmat suits, aerial devices, etc.

### Additional Context
- Occupancy at Time: Occupied, vacant, after-hours
- Pre-fire Conditions: Utilities status, alarm systems, sprinklers
- Investigation Status: Ongoing, ruled accidental, arson suspected, etc.
- Remarks/Notes: Any other relevant details, witness statements, or unusual circumstances

## OUTPUT FORMAT:
Return extracted data as HTML using semantic tags. For each field:
- Use \`<div class="nfirs-field">\` wrapper
- Use \`<div class="field-label">\` for field name (e.g., "Incident Date/Time")
- Use \`<div class="field-value">\` for the extracted value
- If a field is not mentioned or cannot be determined, use "Not specified" as the value
- For multi-part fields (e.g., location with street, city, state), format clearly with commas or line breaks
- For lists (injuries, units, etc.), use bullet points or comma-separated values

## ACCURACY REQUIREMENTS:
- Only extract information explicitly stated or strongly implied in the description
- Flag any assumptions made with qualifiers like "(estimated)" or "(implied)"
- If information is contradictory, note the contradiction
- Prioritize completeness - extract all available data from the description
- Use consistent terminology aligned with NFIRS standards`;
        
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            const description = incidentTextarea.value.trim();
            
            if (!apiKey) {
                showError('Please enter your Anthropic API key');
                return;
            }
            
            if (!description) {
                showError('Please describe the incident');
                return;
            }
            
            await generateReport(apiKey, description);
        });
        
        copyBtn.addEventListener('click', () => {
            const html = outputDiv.innerHTML;
            const text = outputDiv.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                showError('Failed to copy to clipboard');
            });
        });
        
        async function generateReport(apiKey, description) {
            generateBtn.disabled = true;
            outputDiv.innerHTML = '<div class="loading">Generating report...</div>';
            copyBtn.style.display = 'none';
            
            try {
                const response = await fetch(ANTHROPIC_API_URL, {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-haiku-4-5-20251001',
                        max_tokens: 2048,
                        system: NFIRS_SYSTEM_PROMPT,
                        messages: [
                            {
                                role: 'user',
                                content: `Extract and analyze the following fire incident narrative according to NFIRS 5.0 standards:\n\n${description}`
                            }
                        ]
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `API error: ${response.status}`);
                }
                
                const data = await response.json();
                const reportContent = data.content[0].text;
                
                outputDiv.innerHTML = `
                    <div class="output-header">
                        <h2>NFIRS Report</h2>
                    </div>
                    ${reportContent}
                `;
                copyBtn.style.display = 'inline-block';
                
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                generateBtn.disabled = false;
            }
        }
        
        function showError(message) {
            outputDiv.innerHTML = `<div class="error">${message}</div>`;
            copyBtn.style.display = 'none';
        }
    </script>
</body>
</html>
